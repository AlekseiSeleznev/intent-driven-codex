schema: intent-driven

rules:
  proposal:
    - Use grill-with-docs after an initial proposal draft when scope, risk, assumptions, or Brownfield context are material.
  specs:
    - Use OpenSpec Markdown delta specs with normative MUST/SHALL requirement text and Gherkin-style scenarios.
  design:
    - Use C4-style diagrams when architecture boundaries, integrations, runtime units, or deployment shape are non-trivial.
  adr:
    - Create per-change adr.md for every change and keep durable ADRs append-only under top-level adr/.
  tasks:
    - Keep tasks dependency-ordered, checkbox-based, and verifiable.
